<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Portale Cittadini — Ospedale San Camillo{% endblock %}</title>
  <style>
    :root {
      --primary: #dc2626;
      --primary-dark: #b91c1c;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263044;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --success: #22c55e;
      --warning: #f59e0b;
      --info: #3b82f6;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    /* NAV */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-brand span { color: var(--primary); }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
      transition: all .15s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: var(--surface2);
      color: var(--text);
    }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .nav-user img {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all .15s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* LAYOUT */
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* FORM */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    .form-full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .form-input, .form-select, .form-textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--primary);
    }
    .form-textarea { resize: vertical; min-height: 80px; }

    /* BUTTONS */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all .15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-info { background: var(--info); color: white; }
    .btn-info:hover { background: #2563eb; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }

    /* PILLS */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .pill-green { background: rgba(34,197,94,.15); color: #4ade80; }
    .pill-red { background: rgba(239,68,68,.15); color: #f87171; }
    .pill-yellow { background: rgba(245,158,11,.15); color: #fbbf24; }
    .pill-blue { background: rgba(59,130,246,.15); color: #60a5fa; }
    .pill-gray { background: rgba(148,163,184,.15); color: #94a3b8; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      padding: 10px 12px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ALERT */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-info { background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.3); color: #93c5fd; }
    .alert-warning { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); color: #fcd34d; }
    .alert-success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: #86efac; }

    /* HERO */
    .page-hero {
      margin-bottom: 28px;
    }
    .page-hero h1 { font-size: 24px; font-weight: 700; }
    .page-hero p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/cittadini/dashboard" class="nav-brand">
    🏥 <span>San Camillo</span> Portale Cittadini
  </a>
  {% if user %}
  <div class="nav-links">
    <a href="/cittadini/tessera" {% if request.url.path == '/cittadini/tessera' %}class="active"{% endif %}>🪪 Tessera</a>
    <a href="/cittadini/prenotazioni" {% if request.url.path == '/cittadini/prenotazioni' %}class="active"{% endif %}>📅 Visite</a>
    <a href="/cittadini/referti" {% if request.url.path == '/cittadini/referti' %}class="active"{% endif %}>📋 Referti</a>
    <a href="/cittadini/candidatura" {% if request.url.path == '/cittadini/candidatura' %}class="active"{% endif %}>👨‍⚕️ Candidatura</a>
    <a href="/cittadini/corsi" {% if request.url.path == '/cittadini/corsi' %}class="active"{% endif %}>🩺 Corsi</a>
  </div>
  <div class="nav-user">
    {% if user.avatar %}
    <img src="https://cdn.discordapp.com/avatars/{{ user.discord_id }}/{{ user.avatar }}.png" alt="avatar">
    {% endif %}
    <span>{{ user.username }}</span>
    <a href="/cittadini/logout" class="btn-logout">Esci</a>
  </div>
  {% endif %}
</nav>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
